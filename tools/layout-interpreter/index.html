<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Interpreter — Fanki</title>
    <meta name="description" content="Intérprete de manifiestos de estadio (BAN) a Layout JSON de Fanki.">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">
                <a href="../../index.html" class="back-home" title="Volver a Ops Tools">&larr; Ops Tools</a>
                <span class="logo-icon">🧩</span>
                <h1>Layout Interpreter <span class="tagline">— Manifiesto → Layout JSON</span></h1>
            </div>
            <div class="header-actions">
                <div class="format-toggle" id="formatToggle">
                    <span class="format-label">Formato</span>
                    <button class="format-opt" data-fmt="BAN" type="button">BAN</button>
                    <button class="format-opt" data-fmt="FANKI" type="button">Fanki</button>
                </div>
                <button id="resetAll" class="btn btn-secondary btn-sm">
                    <span class="icon">🗑️</span> Reset
                </button>
            </div>
        </header>

        <main class="main-content">
            <nav class="tabs-nav" id="tabsNav"></nav>
            <div class="tab-content" id="tabContent"></div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
